name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Pinned to the major used locally (see plans/unit-tests/phase-04).
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run lint

      # Runs the unit suite and enforces the coverage floors from
      # vitest.config.ts (global + lib/**).
      - run: npm run test:coverage
